name: Auto Label PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-label:
    name: Auto Label
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Labeler
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Label by size
        uses: codelytv/pr-size-labeler@4e4a0826cc0e6c3f1c81e8f2eb1b49cfbde2a86d # v1.9.1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/XS'
          xs_max_size: '10'
          s_label: 'size/S'
          s_max_size: '100'
          m_label: 'size/M'
          m_max_size: '500'
          l_label: 'size/L'
          l_max_size: '1000'
          xl_label: 'size/XL'

      - name: Label by language
        run: |
          echo "Detecting primary language..."
          if [ -f "package.json" ]; then
            gh pr edit ${{ github.event.pull_request.number }} --add-label "lang/typescript"
          elif [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
            gh pr edit ${{ github.event.pull_request.number }} --add-label "lang/python"
          elif [ -f "go.mod" ]; then
            gh pr edit ${{ github.event.pull_request.number }} --add-label "lang/go"
          elif [ -f "Cargo.toml" ]; then
            gh pr edit ${{ github.event.pull_request.number }} --add-label "lang/rust"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
